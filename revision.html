<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

:root {
    --bleu1: #1E3a5f;
    --bleuclaire: #6fa8dc;
}

* {
    list-style: none;
    text-decoration:none;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #f4f4f4;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    color: #161616;
    font-family: Arial, Helvetica, sans-serif;
}

.header {
    width: 100%;
    margin-bottom: 3px;
    margin-top: 30px;
    font-family: poppins, sans-serif;
    font-weight: 700;
    font-size: 23px;
    color: #161616;
}

#fermer {
    align-self: center;
    font-size: 1.3rem;
    color: #161616;
    cursor: pointer;
    border: none;
    padding: 10px 15px;
    border-radius: 7px;
    transition: 0.3s ease;
    background: none;
}

#fermer2 {
    display: none;
}

#fermer:hover {
    transform: scale(1.2);
    color: #000000;
    transition: 0.3s ease;
}

/* Sidebar Layout */
.side-bar { 
    width: 200px;
    background: var(--bleu1);
    color: var(--bleuclaire);
    height: 100vh;
    padding: 0px 16px;
    box-shadow: 4px 0 15px rgba(0, 0, 0, 0.08);
    overflow-y: auto;
    border-radius: 0 24px 24px 0;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
}

.side-bar.close {
    width: 200px;
    background: var(--bleu1);
    color: var(--bleuclaire);
    height: 100vh;
    padding: 0px 16px;
    box-shadow: 4px 0 15px rgba(0, 0, 0, 0.08);
    overflow-y: auto;
    border-radius: 0 24px 24px 0;
}

.side-bar.close span {
    opacity: 1;
    width: auto;
    overflow: auto;
    display: inline;
}

.side-bar.close button {
    gap: 10px;
    transition: ease 0.3s;
    text-align: center;
}

/* Sidebar Elements */
.bouttons-actions {
    position: relative;
    margin-top: 30px;
    margin-left: 10px;
    margin-right: 10px;
}

.bouttons-actions ul {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.bouttons-actions button {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    width: 100%;
    border: none;
    font-size: 15px;
    border-radius: 11px;
    padding: 11px 10px;
    cursor: pointer;
    transition: 0.2s ease;
    white-space: nowrap;
    background: #e7e7e7;
    color: #161616;
    border: 1px solid #c7c7c7;
}

.bouttons-actions button:hover {
    transform: translateX(5px);
    background-color: #d8d8d8;
}

.pied-de-page {
    margin-top: auto;
    padding: 15px;
}

/* Main Content Area */
.contenue-ia {
    flex: 1;
    background-color: #ffffff;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-y: auto;
}

.haut-de-page-contenu-ia {
    display: flex; 
    font-family: Arial, Helvetica, sans-serif;
    justify-content: space-between;
    align-items: center;
    padding: 19px 40px;
    width: 100%;
    padding-top: 30px;
}
.haut-de-page-contenu-ia h1{
    position: absolute;
    right: 10px;
}

.nom-retour {
    background:none;
    position: absolute;
    display: flex;
    align-items: center;
    gap: 15px;
    left: 10px;
}

#retoutpageprincipale {
    background: #e7e7e7;
    border: none;
    padding: 10px 20px;
    font-size: 1rem;
    border-radius: 11px;
    color: #161616;
    cursor: pointer;
    transition: 0.2s;
}

#retoutpageprincipale2{
    display: none;
}

#retoutpageprincipale:hover {
    transform: scale(1.05);
    color: #161616;
    background-color: #d0d0d0;
    outline: 1px solid #b0b0b0;
}

.nom-ia {
    font-size: 25px;
    font-weight: bold;
    color: #161616;
}

#phrase-intro {
    margin-top: auto;
    margin-bottom: auto;
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    padding: 0 20px;
    color: #161616;
}

.elements-inputs-container {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-bottom: 30px;
    background: transparent;
    margin-top: auto;
}

.elements-inputs {
    background: #ffffff;
    padding: 5px 15px;
    border: 1px solid #c7c7c7;
    width: 90%;
    max-width: 700px;
    align-self: center;
    justify-self: center ;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    border-radius: 50px;
}

.elements-inputs input {
    flex: 1; 
    padding: 15px 10px;
    background: none;
    border: none;
    color: #161616;
    font-size: 16px;
}

.elements-inputs input::placeholder {
    color: #555;
    font-size: 16px;
}

input:focus {
    outline: none;
}

#envoyerbtn {
    font-size: 15px;
    padding: 10px 20px;
    border: 1px solid #c7c7c7;
    border-radius: 25px;
    background: #e7e7e7;
    color: #161616;
}

#plus-input-btn {
    padding: 10px;
    font-size: 14px;
    border: 1px solid #c7c7c7;
    border-radius: 50%;
    display: flex;
    align-items: center;
    background: #e7e7e7;
    color: #161616;
}

.elements-inputs button {
    background-color: #e7e7e7;
    color: #161616;
    cursor: pointer;
    transition: 0.2s ease;
    border: 1px solid #c7c7c7;
}

.elements-inputs button:hover {
    background-color: #d8d8d8;
    color: #161616;
    transition: 0.2s ease;
    border: 1px solid #999999;
}

@media (max-width: 768px) {
    body {
        flex-direction: row; 
        position: relative;
    }

    .side-bar {
        position: fixed; 
        top: 0;
        left: 240px; 
        width: 240px;
        height: 100%;
        box-shadow: 5px 0 15px rgba(0, 0, 0, 0.1);
    }

    .side-bar.open {
        left: 0;
    }

    .side-bar.open span {
        opacity: 1 !important;
        width: auto !important;
        display: inline !important;
    }

    .bouttons-actions ul {
        flex-direction: column; 
        gap: 20px;
    }

    .haut-de-page-contenu-ia {
        flex-direction: row;
        gap: 15px;
        padding: 15px;
        text-align: center;
        background-color: #f0f0f0;
        color: #161616;
    }
    #retoutpageprincipale{
        background: #e7e7e7;
        color: #161616;
        display: none;
    }

    .nom-retour {
        justify-content: center;
    }

    .elements-inputs {
        width: 95%;
        background: #ffffff;
        padding: 5px 15px;
        border: 1px solid #c7c7c7;
        max-width: 700px;
        align-self: center;
        justify-self: center ;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        border-radius: 50px;
    }
    .nom-retour span{
        display: none;
    }
    #fermer2 {
        font-size: 1.3rem;
        color: #161616;
        cursor: pointer;
        border: none;
        padding: 10px 15px;
        border-radius: 7px;
        transition: 0.3s ease;
        background: none;
        display: block;
    }
}
    </style>
      <div class="side-bar">
        <!-- non de l'interface-->
        <div class="header">
            <button id="fermer">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
        <hr>
        <!-- deifferents bouttons pour les actions-->
        <div class="bouttons-actions">
            <ul>
                    <li>
                    <!--creation d'un nouveau chat-->
                    <button id="boutonaction">
                        <i class="fa-regular fa-pen-to-square"></i>
                        <span>Nouveau chat</span>
                    </button>
                   </li>
                     <li>
                        <!--toutes les discussions recentes-->
                        <button class="boutonaction">
                            <i class="fa-solid fa-angle-down"></i>
                            <span>discussions recentes</span>
                        </button >
                    </li>
                    <li>
                        <a href="intermediare.html">
                            <button id="retoutpageprincipale2">
                                <i class="fa-solid fa-arrow-left"></i>
                            </button>
                        </a>
                    </li>
            </ul>
        </div>
        <!--identification des createur de l'interface-->
    </div>
    <!--partie dedier au messages-->
    <div class="contenue-ia">
        <!--haut de page-->
        <div class="haut-de-page-contenu-ia">
            <button type="button" id="fermer2">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="nom-retour">
                <a href="intermediare.html">
                    <button id="retoutpageprincipale">
                      <i class="fa-solid fa-arrow-left"></i>
                    </button>
                </a>
                <span class="nom-ia">Revision</span>
            </div>
            <h1>IMAGE</h1>
        </div>
        <h2 id="phrase-intro">Dis-moi ce que tu veux maitriser aujourd'hui!!</h2>
        <!--inputs et bouttons pour envoyer les messages-->
        <div class="elements-inputs">
            <button id="plus-input-btn">
                <i class="fa-solid fa-plus"></i>
            </button>
            <input type="text" placeholder="tu es pret?">
            <button id="envoyerbtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
    <script>
        const closebtn = document.getElementById('fermer');
let sidebare = document.querySelector('.side-bar');
let btnaction = document.querySelector('.boutonaction')

function close(){
    sidebare.classList.toggle("close");
}

closebtn.addEventListener('click',close);
    </script>
</body>
</html>
